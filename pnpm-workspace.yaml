catalogMode: prefer

cleanupUnusedCatalogs: true
ignoreWorkspaceRootCheck: true
shellEmulator: true
strictPeerDependencies: false
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1
  - chokidar@4.0.3
  - webdriverio@9.29.1
  - webdriver@9.29.1
  - '@wdio/types@9.29.1'
  - '@wdio/repl@9.16.2'
  - '@wdio/utils@9.29.1'
  - '@wdio/config@9.29.1'
  - '@wdio/logger@9.29.1'
  - '@wdio/protocols@9.29.1'
  - undici-types@6.21.0
  - undici@6.21.3
  - rxjs@7.8.2
packages:
  - docs
  - packages/*
  - examples/*
  - test/*
  - test/e2e/dts/*
  - test/e2e/fixtures/conditions-pkg
overrides:
  '@types/node': 'catalog:'
  '@vitest/browser': workspace:*
  '@vitest/browser-playwright': workspace:*
  '@vitest/browser-preview': workspace:*
  '@vitest/ui': workspace:*
  acorn: 8.11.3
  mlly: ^1.8.0
  rollup: 'catalog:'
  vite: 'catalog:'
  vitest: workspace:*
patchedDependencies:
  '@sinonjs/fake-timers@15.4.0': patches/@sinonjs__fake-timers@15.4.0.patch
  acorn@8.11.3: patches/acorn@8.11.3.patch
  cac@6.7.14: patches/cac@6.7.14.patch
  istanbul-lib-instrument: patches/istanbul-lib-instrument.patch
  istanbul-lib-source-maps: patches/istanbul-lib-source-maps.patch
  rrweb-snapshot@2.0.1: patches/rrweb-snapshot@2.0.1.patch
