name: Setup Playwright
description: Setup and cache Playwright browser binaries

inputs:
  browsers:
    required: false
    default: chromium
    description: 'Playwright browsers to install: "chromium" (headless shell only) or "all"'

runs:
  using: composite
  steps:
    - name: Resolve package versions
      id: resolve-package-versions
      shell: bash
      run: >
        echo "$(
          node -e "
            const fs = require('fs');
            const lockfile = fs.readFileSync('./pnpm-lock.yaml', 'utf8');
            const pattern = (name) => new RegExp(name + ':\\\s+specifier: [\\\s\\\w\\\.^]+version: (\\\d+\\\.\\\d+\\\.\\\d+)');
            const playwrightVersion = lockfile.match(pattern('playwright'))[1];
            console.log('PLAYWRIGHT_VERSION=' + playwrightVersion);
          "
        )" >> $GITHUB_OUTPUT

    - name: Check resolved package versions
      shell: bash
      if: |
        contains(fromJSON('[null, "", "undefined"]'), steps.resolve-package-versions.outputs.PLAYWRIGHT_VERSION)
      run: echo "Failed to resolve package versions. See log above." && exit 1

    - name: Cache Playwright v${{ steps.resolve-package-versions.outputs.PLAYWRIGHT_VERSION }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: playwright-cache
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: ${{ runner.os }}-playwright-${{ inputs.browsers }}-${{ steps.resolve-package-versions.outputs.PLAYWRIGHT_VERSION }}
        restore-keys: |
          ${{ runner.os }}-playwright-${{ inputs.browsers }}-

    # webkit/firefox link against apt system libraries (e.g. webkit's libwoff2dec)
    # that are NOT stored in the browser cache, so install them on Linux whenever
    # the full set is requested, even on a cache hit. chromium needs none, and
    # Windows/macOS need no system deps (--with-deps on Windows is a slow ~3min
    # Media Foundation DISM).
    - name: Install Playwright system deps (Linux)
      shell: bash
      if: runner.os == 'Linux' && inputs.browsers == 'all'
      run: pnpm exec playwright install-deps

    - name: Install Playwright chromium (cache miss)
      shell: bash
      if: steps.playwright-cache.outputs.cache-hit != 'true' && inputs.browsers != 'all'
      run: pnpm exec playwright install chromium --only-shell

    - name: Install Playwright browsers (cache miss)
      shell: bash
      if: steps.playwright-cache.outputs.cache-hit != 'true' && inputs.browsers == 'all'
      run: pnpm exec playwright install --only-shell
