name: CI

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: 'Lint: node-latest, ubuntu-latest'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache

      - name: Install
        run: pnpm i

      - name: Build
        run: pnpm run build

      - name: Generate CLI docs
        run: pnpm -C docs run cli-table

      # check uncommited LICENSE.md, auto-imports.d.ts, etc...
      - name: Check stale build artifacts
        run: git diff --exit-code

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Typecheck UI
        run: pnpm run -C packages/ui typecheck:client

      # From https://github.com/rhysd/actionlint/blob/main/docs/usage.md#use-actionlint-on-github-actions
      - name: Check workflow files
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color -shellcheck=""

  changed:
    runs-on: ubuntu-latest
    name: 'Diff: node-latest, ubuntu-latest'
    outputs:
      should_skip: ${{ steps.changed-files.outputs.only_changed == 'true' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            docs/**
            .github/**
            !.github/workflows/ci.yml
            **.md

  test:
    needs: changed
    name: 'Build&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [22, 24]
        # split the test files across two runners per os/node combination
        shard: [1, 2]
        include:
          - os: macos-latest
            node_version: 24
            shard: 1
          - os: macos-latest
            node_version: 24
            shard: 2
          - os: windows-latest
            node_version: 24
            # Windows runs only the OS-sensitive suites in the default config;
            # the remaining suites are covered on Windows by the test-cached job.
            test_cmd: test:ci:os-sensitive
            shard: 1
          - os: windows-latest
            node_version: 24
            test_cmd: test:ci:os-sensitive
            shard: 2
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run ${{ matrix.test_cmd || 'test:ci' }} --shard=${{ matrix.shard }}/2
        env:
          VITEST_CI_BLOB_LABEL: ${{ matrix.os }}-node-${{ matrix.node_version }}

      # dts packages run tsc, not vitest, so they are not sharded; run them once
      # per os/node where the full test:ci suite runs (skipped on the Windows
      # os-sensitive run, which never included them).
      - name: Type Check (dts)
        if: matrix.os != 'windows-latest' && matrix.shard == 1
        run: pnpm run test:dts

      - name: Test Examples
        if: matrix.os == 'ubuntu-latest' && matrix.shard == 1
        run: pnpm run test:examples

      - name: Unit Test UI
        if: matrix.shard == 1
        run: pnpm -C packages/ui test:ui
        env:
          VITEST_CI_BLOB_LABEL: ${{ matrix.os }}-node-${{ matrix.node_version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.os }}-node-${{ matrix.node_version }}-shard-${{ matrix.shard }}
          path: test/ui/test-results/
          retention-days: 30

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: vitest-results-${{ matrix.os }}-node-${{ matrix.node_version }}-shard-${{ matrix.shard }}
          path: |
            README.md
            test/unit/.vitest
            test/e2e/.vitest
            packages/ui/.vitest
          retention-days: 1
          include-hidden-files: true

  test-cached:
    needs: changed
    name: 'Cache&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    strategy:
      matrix:
        node_version: [24]
        # split the test files across two runners per os
        shard: [1, 2]
        os:
          # the fs cache is filesystem-sensitive, so Linux + Windows (NTFS) suffice.
          - ubuntu-latest
          - windows-latest
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:ci:cache --shard=${{ matrix.shard }}/2

  test-browser:
    needs: changed
    name: 'Browsers: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: [24]
        # split the browser spec files across two runners per os
        shard: [1, 2]
        os:
          - macos-latest
          - windows-latest
      fail-fast: false

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test Browser (playwright)
        run: pnpm run test:browser:playwright --shard=${{ matrix.shard }}/2

  test-vite7:
    needs: changed
    # macos-latest is the fastest one
    name: 'Test: vite@7, ${{ matrix.suite }}${{ matrix.shard }}, node-24, macos-latest'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: macos-latest

    timeout-minutes: 30

    strategy:
      # split the node suite (across two shards) and the browser suite onto
      # separate runners so they run in parallel instead of sequentially
      matrix:
        include:
          - suite: node
            shard: 1
          - suite: node
            shard: 2
          - suite: browser
            shard: 1
          - suite: browser
            shard: 2
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: 24

      - name: Install
        run: |
          pnpm override-vite7
          git add . && git commit -m "ci" && pnpm i --prefer-offline --no-frozen-lockfile

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test
        if: ${{ matrix.suite == 'node' }}
        run: pnpm run test:ci:no-bail --shard=${{ matrix.shard }}/2

      - name: Type Check (dts)
        if: ${{ matrix.suite == 'node' && matrix.shard == 1 && !cancelled() }}
        run: pnpm run test:dts

      - name: Test Examples
        if: ${{ matrix.suite == 'node' && matrix.shard == 1 && !cancelled() }}
        run: pnpm run test:examples

      - name: Unit Test UI
        if: ${{ matrix.suite == 'node' && matrix.shard == 1 && !cancelled() }}
        run: pnpm -C packages/ui test:ui

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.suite == 'node' && !cancelled() }}
        with:
          name: playwright-report-vite7-shard-${{ matrix.shard }}
          path: test/ui/test-results/
          retention-days: 30

      - name: Test Browser (playwright)
        if: ${{ matrix.suite == 'browser' && !cancelled() }}
        run: pnpm run test:browser:playwright --shard=${{ matrix.shard }}/2

  merge-reports:
    needs:
      - test
      - changed
    if: needs.changed.outputs.should_skip != 'true' && !cancelled()
    runs-on: ubuntu-latest
    name: Merge Reports
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-and-cache

      - name: Install
        run: pnpm i

      - name: Build
        run: pnpm run build

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: vitest-results-*
          merge-multiple: true

      - name: Merge reports
        continue-on-error: true
        run: |
          set +e
          pnpm --filter=./packages/ui --no-bail test:ui --merge-reports
          cp ./packages/ui/.vitest/index.html ./packages/ui/.vitest/test-ui.html
          pnpm --filter=./test/unit --filter=./test/e2e --no-bail --sequential test --merge-reports
          cp -rf ./test/unit/.vitest/index.html ./test/unit/.vitest/test-unit.html
          cp -rf ./test/e2e/.vitest/index.html ./test/e2e/.vitest/test-e2e.html
        env:
          VITEST_CI_MERGE_REPORTS: 'true'

      - name: Upload Test UI Report
        id: upload-ui-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./packages/ui/.vitest/test-ui.html
          archive: false
          retention-days: 7

      - name: Upload Test Unit Report
        id: upload-unit-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./test/unit/.vitest/test-unit.html
          archive: false
          retention-days: 7

      - name: Upload Test E2E Report
        id: upload-e2e-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./test/e2e/.vitest/test-e2e.html
          archive: false
          retention-days: 7

      - name: Link CI reports
        run: |
          echo "::notice title=CI reports::test/unit: ${STEPS_UPLOAD_UNIT_REPORT_OUTPUTS_ARTIFACT_URL}"
          echo "::notice title=CI reports::test/e2e: ${STEPS_UPLOAD_E2E_REPORT_OUTPUTS_ARTIFACT_URL}"
          echo "::notice title=CI reports::packages/ui: ${STEPS_UPLOAD_UI_REPORT_OUTPUTS_ARTIFACT_URL}"
        env:
          STEPS_UPLOAD_UNIT_REPORT_OUTPUTS_ARTIFACT_URL: ${{ steps.upload-unit-report.outputs.artifact-url }}
          STEPS_UPLOAD_E2E_REPORT_OUTPUTS_ARTIFACT_URL: ${{ steps.upload-e2e-report.outputs.artifact-url }}
          STEPS_UPLOAD_UI_REPORT_OUTPUTS_ARTIFACT_URL: ${{ steps.upload-ui-report.outputs.artifact-url }}
