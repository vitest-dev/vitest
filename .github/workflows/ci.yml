name: CI

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  VITEST_GENERATE_UI_TOKEN: 'true'

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: 'Lint: node-latest, ubuntu-latest'
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache

      - name: Install
        run: pnpm i

      - name: Build
        run: pnpm run build

      - name: Generate CLI docs
        run: pnpm -C docs run cli-table

      # check uncommited LICENSE.md, auto-imports.d.ts, etc...
      - name: Check stale build artifacts
        run: git diff --exit-code

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Typecheck UI
        run: pnpm run -C packages/ui typecheck:client

      # From https://github.com/rhysd/actionlint/blob/main/docs/usage.md#use-actionlint-on-github-actions
      - name: Check workflow files
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color -shellcheck=""

  changed:
    runs-on: ubuntu-latest
    name: 'Diff: node-latest, ubuntu-latest'
    outputs:
      should_skip: ${{ steps.changed-files.outputs.only_changed == 'true' }}

    steps:
      - uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            docs/**
            .github/**
            !.github/workflows/ci.yml
            **.md

  test:
    needs: changed
    name: 'Build&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    strategy:
      matrix:
        os: [ubuntu-latest]
        node_version: [20, 22, 24]
        include:
          - os: macos-latest
            node_version: 24
          - os: windows-latest
            node_version: 24
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      # - name: Test
      #   run: pnpm run test:ci
      #   env:
      #     VITEST_CI_BLOB_LABEL: ${{ matrix.os }}-node-${{ matrix.node_version }}

      - name: Test Examples
        run: pnpm run test:examples

      - name: Unit Test UI
        run: pnpm -C packages/ui test:ui
        env:
          VITEST_CI_BLOB_LABEL: ${{ matrix.os }}-node-${{ matrix.node_version }}

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.os }}-node-${{ matrix.node_version }}
          path: test/ui/test-results/
          retention-days: 30

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: vitest-results-${{ matrix.os }}-node-${{ matrix.node_version }}
          path: |
            README.md
            test/unit/.vitest
            test/e2e/.vitest
            packages/ui/.vitest
          retention-days: 1
          include-hidden-files: true

  test-cached:
    needs: changed
    name: 'Cache&Test: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}

    timeout-minutes: 30

    strategy:
      matrix:
        node_version: [24]
        os:
          - macos-latest
          - windows-latest
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:ci:cache

  test-browser:
    needs: changed
    name: 'Browsers: node-${{ matrix.node_version }}, ${{ matrix.os }}'
    if: needs.changed.outputs.should_skip != 'true'

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node_version: [24]
        os:
          - macos-latest
          - windows-latest
      fail-fast: false

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: ${{ matrix.node_version }}

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
      - uses: browser-actions/setup-firefox@fcf821c621167805dd63a29662bd7cb5676c81a8 # v1.7.1

      - name: Install
        run: pnpm i

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test Browser (playwright)
        run: pnpm run test:browser:playwright

      - name: Test Browser (webdriverio)
        run: pnpm run test:browser:webdriverio

  test-rolldown:
    needs: changed
    # macos-latest is the fastest one
    name: 'Rolldown&Test: node-22, macos-latest'
    if: needs.changed.outputs.should_skip != 'true'
    runs-on: macos-latest

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache
        with:
          node-version: 22

      - uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1

      - name: Install
        run: |
          yq -i '.overrides.vite = "npm:vite@8"' pnpm-workspace.yaml
          git add . && git commit -m "ci" && pnpm i --prefer-offline --no-frozen-lockfile

      - uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test:ci:no-bail

      - name: Test Examples
        if: ${{ !cancelled() }}
        run: pnpm run test:examples

      - name: Test Browser (playwright)
        if: ${{ !cancelled() }}
        run: pnpm run test:browser:playwright

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-rolldown
          path: rolldown/test/ui/test-results/
          retention-days: 30

  merge-reports:
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    name: Merge Reports
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-and-cache

      - name: Install
        run: pnpm i

      - name: Build
        run: pnpm run build

      - uses: actions/download-artifact@v4
        with:
          pattern: vitest-results-*
          merge-multiple: true

      - name: Merge reports (UI)
        continue-on-error: true
        run: |
          pnpm --filter=./packages/ui test --merge-reports
          cp ./packages/ui/.vitest/html/index.html ./packages/ui/.vitest/html/test-ui.html
        env:
          VITEST_CI_MERGE_REPORTS: 'true'

      - name: Upload Test UI Report
        uses: actions/upload-artifact@v7
        with:
          path: ./packages/ui/.vitest/html/test-ui.html
          archive: false
          retention-days: 7

      - name: Merge reports
        continue-on-error: true
        run: pnpm --filter=./test/unit --filter=./test/e2e --no-bail --sequential test --merge-reports --reporter=html

      - name: Merge reports html
        id: merge-html
        run: |
          mkdir -p html-all
          cp -rf test/unit/html html-all/unit
          cp -rf test/e2e/html html-all/e2e
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        id: upload-report
        with:
          name: vitest-ci-report-${{ steps.merge-html.outputs.short_sha }}
          path: html-all
          retention-days: 7

      - name: Link report viewer
        run: |
          echo "::notice title=Vitest HTML report::View HTML report: https://viewer.vitest.dev/?url=${{ steps.upload-report.outputs.artifact-url }}"
          echo "[View HTML report](https://viewer.vitest.dev/?url=${{ steps.upload-report.outputs.artifact-url }})" >> $GITHUB_STEP_SUMMARY
