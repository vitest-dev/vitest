name: Publish Package

on:
  push:
    branches:
      - main
      - 'v[0-9]*'

permissions: {}

env:
  VITE_TEST_WATCHER_DEBUG: 'false'

jobs:
  detect:
    if: github.repository == 'vitest-dev/vitest'
    name: Detect release commit
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.detect.outputs.release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
      publish_commit: ${{ steps.detect.outputs.publish_commit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Set node version to 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Detect release
        id: detect
        env:
          RANGE: ${{ github.event.before }}..${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: pnpm exec tsx scripts/detect-release.ts --range "$RANGE" --branch "$BRANCH"

  publish:
    if: needs.detect.outputs.release == 'true'
    needs: detect
    name: Publish Vitest
    runs-on: ubuntu-latest
    permissions:
      contents: write # trusted publishing and changelog requirement
      id-token: write # trusted publishing requirement
    environment: Release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Set node version to 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          # disable cache to avoid cache poisoning
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile --prefer-offline
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build
        run: pnpm build

      - name: Dry run publish
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: npm i -g npm@^11.5.2 && pnpm run publish-ci --version "$VERSION" --dry-run

      - name: Publish to npm
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: pnpm run publish-ci --version "$VERSION"

      - name: Push release tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name "vitest-release-bot"
          git config user.email "actions@github.com"

          if git rev-parse --verify --quiet "refs/tags/$TAG"; then
            tag_sha="$(git rev-list -n 1 "$TAG")"

            if [ "$tag_sha" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG already exists at $tag_sha, expected $GITHUB_SHA"
              exit 1
            fi

            echo "Tag $TAG already exists at the current release commit"
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Generate Changelog
        env:
          TAG: ${{ needs.detect.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx changelogithub --to "$TAG" --name "$TAG"
