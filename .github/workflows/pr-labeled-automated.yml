name: Label Automated PR

on:
  pull_request_target:
    types: [opened, edited]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.body, '<!-- VITEST_AUTOMATED_PR -->')
    steps:
      - name: maybe automated
        uses: actions-cool/issues-helper@200c78641dbf33838311e5a1e0c31bbdb92d7cf0 # v3.8.0
        with:
          actions: add-labels
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          labels: maybe automated
