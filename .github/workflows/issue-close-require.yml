name: Issue Close Require

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  close-stale:
    runs-on: ubuntu-slim
    name: Close Marked Issues and PRs
    permissions:
      contents: read # to check out the repo for local actions
      issues: write # to close issues
      pull-requests: write # to close pull requests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: needs reproduction
        uses: ./.github/actions/issues-helper
        with:
          actions: close-issues
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: needs reproduction
          inactive-day: 3
      - name: maybe automated
        uses: ./.github/actions/issues-helper
        with:
          actions: close-issues
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: maybe automated
          inactive-day: 3
