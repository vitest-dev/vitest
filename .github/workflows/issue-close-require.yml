name: Issue Close Require

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  close-issues:
    runs-on: ubuntu-slim
    name: Close Marked Issues
    permissions:
      issues: write # to query and close inactive labeled issues
    steps:
      - name: Close inactive labeled issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const cutoff = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000)

            async function closeIssuesByLabel(label) {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: label,
                per_page: 100,
              })

              const staleIssues = issues.filter(issue =>
                !issue.pull_request && new Date(issue.updated_at) <= cutoff
              )

              for (const issue of staleIssues) {
                console.log(`Closing issue #${issue.number} labeled ${label}, last updated at ${issue.updated_at}`)
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                })
              }

              if (staleIssues.length === 0) {
                console.log(`No inactive ${label} issues found`)
              }
            }

            await closeIssuesByLabel('needs reproduction')
            await closeIssuesByLabel('maybe automated')

  close-prs:
    runs-on: ubuntu-slim
    name: Close Marked PRs
    permissions:
      issues: read # to query PRs by label via the issues API
      pull-requests: write # to close pull requests
    steps:
      - name: maybe automated PRs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const cutoff = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000)

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'maybe automated',
              per_page: 100,
            })

            const prs = issues.filter(issue =>
              issue.pull_request && new Date(issue.updated_at) <= cutoff
            )

            for (const pr of prs) {
              console.log(`Closing PR #${pr.number}, last updated at ${pr.updated_at}`)
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              })
            }

            if (prs.length === 0) {
              console.log('No inactive maybe automated PRs found')
            }
